{% extends 'base.html' %}

{% block content %}

<h3>⚙️ Manage Books</h3>

<div class="row">


    <div class="col-md-4">
        <div class="card p-3 shadow-sm">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <input type="hidden" name="book_id" value="{{ edit_book.id }}">

                <input type="text" name="title" class="form-control mb-2" placeholder="Title"
                    value="{{ edit_book.title|default:'' }}" required>

                <input type="text" name="author" class="form-control mb-2" placeholder="Author"
                    value="{{ edit_book.author|default:'' }}" required>

                <input type="number" name="price" class="form-control mb-2" placeholder="Price"
                    value="{{ edit_book.price|default:'' }}" required>

                <input type="file" name="image" class="form-control mb-2">

                <button class="btn btn-success w-100">
                    {% if edit_book %}Update{% else %}Add{% endif %}
                </button>

            </form>

        </div>
    </div>

    <div class="col-md-8">
        <div class="card p-3 shadow-sm">

            <table class="table">
                <tr>
                    <th>Title</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>

                {% for book in books %}
                <tr>
                    <td>{{ book.title }}</td>
                    <td>₹{{ book.price }}</td>
                    <td>
                        <a href="{% url 'home' %}?edit={{book.id}}" class="btn btn-warning btn-sm">
                            Edit
                        </a>
                        <a href="{% url 'delete_book' book.id %}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}

            </table>

        </div>
    </div>

</div>

{% endblock %}
